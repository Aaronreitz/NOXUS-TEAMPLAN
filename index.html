<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Noxus-Teamplan</title>
    <link rel="stylesheet" href="dist.css" />
  </head>

  <body class="bg-noxus-bg text-noxus-text min-h-screen">
    <header class="border-b border-noxus-steel">
      <div class="container py-6">
        <h1 class="text-3xl font-bold">Noxus-Teamplan</h1>
      </div>
    </header>

    <main class="container mt-8">
      <div class="row gap-y-6">
        <section class="col col-12">
          <div class="flex justify-center">
            <div class="w-full max-w-[1600px]">
              <!-- Card: Plan -->
              <div class="card">
                <div class="card-header flex items-center justify-between">
                  <div>
                    <div class="text-muted text-sm">Monatsplan</div>
                    <div id="monthTitle" class="text-xl font-bold">–</div>
                  </div>

                  <div class="flex items-center gap-2">
                    <button
                      id="exportExcelBtn"
                      class="px-3 py-2 rounded-md border border-noxus-steel hover:bg-noxus-panel"
                    >
                      Excel Export
                    </button>

                    <button
                      id="prevMonth"
                      class="px-3 py-2 rounded-md border border-noxus-steel hover:bg-noxus-panel"
                    >
                      <span style="font-size:1.4rem;line-height:0">‹</span>
                    </button>

                    <button
                      id="nextMonth"
                      class="px-3 py-2 rounded-md border border-noxus-steel hover:bg-noxus-panel"
                    >
                      <span style="font-size:1.4rem;line-height:0">›</span>
                    </button>

                    <button
                      id="addColBtn"
                      class="px-3 py-2 rounded-md bg-noxus-red text-white hover:bg-red-800"
                    >
                      + Spalte
                    </button>
                  </div>
                </div>

                <div class="card-body space-y-4">
                  <div
                    class="overflow-auto rounded-lg border border-noxus-steel"
                  >
                    <table
                      id="planTable"
                      class="min-w-[700px] w-full text-sm"
                    ></table>
                  </div>
                </div>
              </div>
              <!-- /Card -->
            </div>
          </div>
        </section>
      </div>
    </main>
    <!-- Kalender-Modal -->
    <div id="calendarModal" class="fixed inset-0 z-50 items-center justify-center" style="display:none;background:rgba(0,0,0,0.75)">
      <div class="bg-noxus-panel border border-noxus-steel rounded-xl shadow-2xl" style="width:440px;max-width:95vw">
        <div class="flex items-center justify-between px-5 py-3 border-b border-noxus-steel">
          <span id="calModalTitle" class="font-bold text-base"></span>
          <div class="flex gap-2">
            <button id="calModalPrint" class="px-3 py-1 text-xs rounded border border-noxus-steel hover:bg-noxus-steel">Drucken</button>
            <button id="calModalClose" class="px-3 py-1 text-xs rounded border border-noxus-steel hover:bg-noxus-steel">✕</button>
          </div>
        </div>
        <div id="calModalGrid" class="p-4"></div>
      </div>
    </div>

    <style>
      @media print {
        body > *:not(#calendarModal) { display: none !important; }
        #calendarModal {
          display: block !important;
          position: static !important;
          background: transparent !important;
        }
        #calModalPrint, #calModalClose { display: none !important; }
      }
    </style>

    <script src="src/lib/xlsx.bundle.js"></script>
    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
